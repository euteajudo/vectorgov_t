name = "vectorgov-t-mcp"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

account_id = "a89dbdb0224cd8d2292cda8a038bc297"

# Gemini vai pelo Cloudflare AI Gateway `vectorgov-t` (endpoint OpenAI-compat),
# com a chave do Google em BYOK no gateway. O Worker autentica com o secret
# CF_AIG_TOKEN (NÃO declarado aqui — é secret):
#   wrangler secret put CF_AIG_TOKEN
# Override opcional da base: secret/var CF_AIG_BASE_URL (default no código).

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "legislacao-tributaria"

[[vectorize]]
binding = "VECTORIZE_CATMAT"
index_name = "catmat-catser"

# Índice de acórdãos do TCU (populado pelo worker de ingestão `vectorgov-a-mcp`).
# Consultado pela tool `buscar_acordaos_tcu` (jurisprudência no fluxo de análise
# de reequilíbrio). Índice V2 1024-dim/cosine; query com returnMetadata:"all".
[[vectorize]]
binding = "VECTORIZE_ACORDAOS"
index_name = "acordaos-tcu"

[[r2_buckets]]
binding = "R2_LEIS"
bucket_name = "vectorgov-t-leis"

[[r2_buckets]]
binding = "R2_SKILLS"
bucket_name = "vectorgov-t-skills"

[[d1_databases]]
binding = "DB"
database_name = "vectorgov-t-db"
database_id = "44068178-9600-42f3-875d-26ce47a11fd4"
migrations_dir = "../../infra/d1-migrations"

[[kv_namespaces]]
binding = "CACHE"
id = "0b4eaf157c064a51bcbf1d5e87af6f66"

# Service binding para o Worker do Container Python (ingestion-api).
# Evita Cloudflare error 1042 (loop detection) quando dois Workers da
# mesma conta tentam se chamar via URL pública. O Worker `vectorgov-t-ingestion`
# expõe `POST /parse` (proxy para o Container Python via Durable Object).
[[services]]
binding = "INGESTION"
service = "vectorgov-t-ingestion"

[observability]
enabled = true

# Durable Object: NotebookAgent (1 DO por notebook do chat NotebookLM).
# Cada DO tem seu storage SQL próprio com documento + chunks + mensagens.
[[durable_objects.bindings]]
name = "NOTEBOOK_AGENT"
class_name = "NotebookAgent"

# Durable Object: SessionAgent (1 DO global "default" por enquanto).
# Persistência SQL do histórico de petições analisadas + pareceres
# gerados pelo PEVSEngine.
[[durable_objects.bindings]]
name = "SESSION_AGENT"
class_name = "SessionAgent"

[[migrations]]
tag = "v2-notebook-agent"
new_sqlite_classes = ["NotebookAgent"]

[[migrations]]
tag = "v3-session-agent"
new_sqlite_classes = ["SessionAgent"]
