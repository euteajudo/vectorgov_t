name = "vectorgov-t-ingestion"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

account_id = "a89dbdb0224cd8d2292cda8a038bc297"

# Container Cloudflare que roda o LegisParser (Python + FastAPI)
[[containers]]
class_name = "IngestionContainer"
image = "./Dockerfile"
# `standard` = 4 GiB RAM. `basic` (1 GiB) dava internal error/OOM no parse da
# LC 214 (53 MB, 500+ artigos) na fase parsing. Docs menores cabiam em 1 GiB.
instance_type = "standard"  # 4 GiB RAM
max_instances = 3

# Durable Object binding — necessário para Containers
[[durable_objects.bindings]]
name = "INGESTION"
class_name = "IngestionContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["IngestionContainer"]

[observability]
enabled = true
